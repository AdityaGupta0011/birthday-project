<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Shivay! ❤️</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Pacifico&family=Poppins:wght@300;600&display=swap"
        rel="stylesheet">
    <style>
        /* --- 1. SETTINGS & VARIABLES --- */
        :root {
            --primary: #ff0a54;
            --secondary: #ff477e;
            --accent: #ff85a1;
            --bg-dark: #1a0b12;
            --text-glow: 0 0 10px rgba(255, 10, 84, 0.8), 0 0 20px rgba(255, 10, 84, 0.5);
            --nav-bg: rgba(26, 11, 18, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- NAVBAR (Fixed Top) --- */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .logo {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: var(--primary);
            font-weight: bold;
        }

        /* Desktop Nav Links */
        .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .music-btn {
            background: var(--primary);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: transform 0.2s;
        }

        .music-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 10, 84, 0.4);
        }

        /* --- HAMBURGER MENU (Mobile Only) --- */
        .hamburger {
            display: none;
            /* Desktop pe hidden */
            cursor: pointer;
            flex-direction: column;
            gap: 5px;
        }

        .hamburger div {
            width: 25px;
            height: 3px;
            background-color: white;
            transition: 0.3s;
        }

        /* --- INTRO SCREEN (GIFT BOX) --- */
        #intro-screen {
            position: absolute;
            z-index: 10;
            text-align: center;
            cursor: pointer;
            transition: opacity 1s ease;
        }

        .gift-box {
            font-size: 100px;
            animation: shake 2s infinite;
            filter: drop-shadow(0 0 20px var(--primary));
            transition: transform 0.3s;
        }

        .gift-box:hover {
            transform: scale(1.1);
        }

        .click-text {
            margin-top: 20px;
            font-size: 1.5rem;
            color: var(--accent);
            animation: pulse 1.5s infinite;
        }

        /* --- MAIN CONTENT --- */
        #main-content {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #2e1020 0%, #000000 100%);
            position: relative;
            z-index: 5;
        }

        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ff0a54, #ff477e, #a600ff);
            background-size: 400% 400%;
            opacity: 0.1;
            animation: gradientBG 15s ease infinite;
            z-index: -1;
        }

        /* Photo Frame */
        .photo-frame {
            width: 300px;
            height: 400px;
            border: 10px solid white;
            border-bottom: 40px solid white;
            box-shadow: 0 0 30px rgba(255, 10, 84, 0.6);
            transform: rotate(-3deg);
            position: relative;
            background: #000;
            overflow: hidden;
            margin-bottom: 30px;
            animation: floatPhoto 3s ease-in-out infinite;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .photo-frame img.active {
            opacity: 1;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 4rem;
            color: #fff;
            text-shadow: var(--text-glow);
            margin-bottom: 10px;
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .typewriter-box {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            min-height: 60px;
            color: var(--accent);
            text-align: center;
            max-width: 80%;
        }

        /* Balloons */
        .balloon {
            position: absolute;
            bottom: -100px;
            width: 50px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.7;
            animation: riseUp 10s linear infinite;
        }

        .balloon::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            width: 2px;
            height: 30px;
            background: white;
        }

        /* Animations */
        @keyframes shake {

            0%,
            100% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(-10deg);
            }

            75% {
                transform: rotate(10deg);
            }
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes floatPhoto {

            0%,
            100% {
                transform: rotate(-3deg) translateY(0);
            }

            50% {
                transform: rotate(-3deg) translateY(-15px);
            }
        }

        @keyframes riseUp {
            0% {
                bottom: -100px;
                transform: translateX(0);
            }

            100% {
                bottom: 120vh;
                transform: translateX(20px);
            }
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* --- MOBILE RESPONSIVE NAV --- */
        @media (max-width: 768px) {
            h1 {
                font-size: 3rem;
            }

            .photo-frame {
                width: 260px;
                height: 350px;
            }

            .typewriter-box {
                font-size: 1.5rem;
            }

            nav {
                padding: 15px 20px;
            }

            /* Show Hamburger */
            .hamburger {
                display: flex;
            }

            /* Hide Links Initially & Style as Dropdown */
            .nav-links {
                display: none;
                /* Hidden by default */
                position: absolute;
                top: 70px;
                /* Push below navbar */
                left: 0;
                width: 100%;
                background: var(--nav-bg);
                flex-direction: column;
                align-items: center;
                padding: 20px 0;
                border-bottom: 2px solid var(--primary);
            }

            /* Class to show menu when active */
            .nav-links.active {
                display: flex;
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">Shivay ❤️</div>

        <div class="hamburger" onclick="toggleMenu()">
            <div></div>
            <div></div>
            <div></div>
        </div>

        <ul class="nav-links">
            <li><a href="./index.html">Home</a></li>
            <li><a href="./Gift.html">Gift 🎁</a></li>
            <li>
                <button class="music-btn" onclick="toggleMusic()">🎵 Play Music</button>
            </li>
        </ul>
    </nav>

    <audio id="bgMusic" loop>
        <source src="./happy-birthday-357371.mp3" type="audio/mpeg">
    </audio>

    <div id="intro-screen" onclick="startParty()">
        <div class="gift-box">🎁</div>
        <div class="click-text">Tap to Open Gift for Shivay</div>
    </div>

    <div id="main-content">
        <div class="bg-overlay"></div>
        <h1>Happy Birthday Shivay! 🎂</h1>

        <div class="photo-frame">
            <img src="./mumma.jpeg" class="slide active" alt="Memory 1">
            <img src="./3d2.jpeg" class="slide" alt="Memory 2">
            <img src="./dada.jpeg" class="slide" alt="Memory 3">
            <img src="./uncle.jpeg" class="slide" alt="Memory 4">
            <img src="./me.jpeg" class="slide" alt="Memory 5">
        </div>

        <div class="typewriter-box" id="message-area"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // --- MOBILE MENU TOGGLE ---
        function toggleMenu() {
            const navLinks = document.querySelector('.nav-links');
            navLinks.classList.toggle('active');
        }

        // --- CONFIGURATION ---
      const messages = [
  "Our Little Shivay 👶💙",
  "Happy 1st Birthday 🎂🥳",
  "Tumhari smile sabse pyari hai 😊",
  "Hamesha haste khelte raho 💖",
  "God bless you always 🙏"
        ];
        let msgIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typeSpeed = 100;
        const eraseSpeed = 50;
        const delayBetween = 2000;

        // --- MUSIC LOGIC ---
        var music = document.getElementById("bgMusic");
        var btn = document.querySelector(".music-btn");
        var isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                btn.innerHTML = "🎵 Play Music";
                btn.style.background = "var(--primary)";
            } else {
                music.play().catch(e => console.log("Audio Error: ", e));
                btn.innerHTML = "⏸ Pause";
                btn.style.background = "#c9184a";
            }
            isPlaying = !isPlaying;
        }

        // --- PARTY STARTER ---
        function startParty() {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';

                if (!isPlaying) toggleMusic();
                fireConfetti();
                startSlideshow();
                typeWriter();
                createBalloons();
            }, 800);
        }

        // --- EFFECTS ---
        function fireConfetti() {
            const duration = 3000;
            const end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff0a54', '#ff477e', '#ffffff'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff0a54', '#ff477e', '#ffffff'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function startSlideshow() {
            const slides = document.querySelectorAll('.slide');
            let currentSlide = 0;
            setInterval(() => {
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }, 3000);
        }

        function typeWriter() {
            const currentMsg = messages[msgIndex];
            const area = document.getElementById('message-area');
            if (!isDeleting && charIndex < currentMsg.length) {
                area.innerHTML += currentMsg.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, typeSpeed);
            } else if (isDeleting && charIndex > 0) {
                area.innerHTML = currentMsg.substring(0, charIndex - 1);
                charIndex--;
                setTimeout(typeWriter, eraseSpeed);
            } else {
                if (!isDeleting) {
                    setTimeout(() => { isDeleting = true; typeWriter(); }, delayBetween);
                } else {
                    isDeleting = false;
                    msgIndex = (msgIndex + 1) % messages.length;
                    setTimeout(typeWriter, 500);
                }
            }
        }

        function createBalloons() {
            setInterval(() => {
                const balloon = document.createElement('div');
                balloon.classList.add('balloon');
                balloon.style.left = Math.random() * 100 + 'vw';
                balloon.style.animationDuration = (Math.random() * 3 + 7) + 's';
                balloon.style.background = `hsl(${Math.random() * 360}, 70%, 60%)`;
                document.getElementById('main-content').appendChild(balloon);
                setTimeout(() => balloon.remove(), 10000);
            }, 800);
        }
    </script>
</body>

</html>
